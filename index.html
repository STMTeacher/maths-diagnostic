<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Maths Diagnostic</title>

<style>
:root{
--bg1:#052a16;
--bg2:#a88400;
--card:#0d0d0d;
--text:#ffffff;
--green:#22c55e;
--red:#dc2626;
--gold:#ffd700;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:500px;
background:var(--card);
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2, h3{
margin:10px 0;
}

button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.option{
background:#1f1f1f;
color:white;
}

.option:hover{
background:#2a2a2a;
}

.correct{
background:var(--green);
}

.wrong{
background:var(--red);
}

.progress{
height:10px;
background:#333;
border-radius:5px;
margin-bottom:15px;
}

.progress-bar{
height:100%;
background:var(--gold);
width:0%;
border-radius:5px;
transition:0.3s;
}

.small{
font-size:14px;
color:#ccc;
}
</style>
</head>

<body>

<div class="container">
<div id="app">Loading...</div>
</div>

<script>
let allQuestions = []
let currentQuestions = []
let currentIndex = 0
let score = 0
let gaps = {}
let selectedTopic = ""

// LOAD CSV
async function loadQuestions(){
const res = await fetch("questions.csv")
const text = await res.text()

const rows = text.trim().split("\n").slice(1)

return rows.map(r=>{
const c = r.split(",")

return {
topic:c[1],
question:c[2],
options:[c[3],c[4],c[5],c[6]],
answer:parseInt(c[8])
}
}).filter(q=>q.question && q.options.length===4)
}

// START SCREEN
function showStart(){

let topics = [...new Set(allQuestions.map(q=>q.topic))]

document.getElementById("app").innerHTML = `
<h2>Select Topic</h2>
${topics.map(t=>`
<button onclick="startQuiz('${t}')">${t}</button>
`).join("")}
`
}

// START QUIZ
function startQuiz(topic){

selectedTopic = topic
currentIndex = 0
score = 0
gaps = {}

currentQuestions = allQuestions
.filter(q=>q.topic === topic)
.sort(()=>0.5 - Math.random())
.slice(0,10)

showQuestion()
}

// SHOW QUESTION
function showQuestion(){

let q = currentQuestions[currentIndex]

document.getElementById("app").innerHTML = `
<div class="progress">
<div class="progress-bar" style="width:${(currentIndex/10)*100}%"></div>
</div>

<h3>Question ${currentIndex + 1}</h3>
<p>${q.question}</p>

${q.options.map((opt,i)=>`
<button class="option" onclick="handleAnswer(${i}, this)">${opt}</button>
`).join("")}
`
}

// HANDLE ANSWER
function handleAnswer(selected, btn){

let q = currentQuestions[currentIndex]
let correct = q.answer

let buttons = document.querySelectorAll(".option")
buttons.forEach(b=>b.disabled = true)

if(selected === correct){
btn.classList.add("correct")
score++
}else{
btn.classList.add("wrong")
buttons[correct].classList.add("correct")

gaps[q.topic] = (gaps[q.topic] || 0) + 1
}

// AUTO NEXT
setTimeout(()=>{
currentIndex++
if(currentIndex < currentQuestions.length){
showQuestion()
}else{
showResults()
}
},2000)
}

// RESULTS
function showResults(){

let weakAreas = Object.keys(gaps).length
? Object.keys(gaps).join(", ")
: "None identified"

document.getElementById("app").innerHTML = `
<h2>Diagnostic Complete</h2>

<p><strong>Score:</strong> ${score}/10</p>

<p><strong>Focus Areas:</strong><br>${weakAreas}</p>

<p class="small">Revisit these topics and try again.</p>

<button onclick="showStart()">Back to Topics</button>
`
}

// INIT
loadQuestions().then(data=>{
allQuestions = data
showStart()
})
</script>

</body>

</html>
