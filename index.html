<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GCSE Maths Diagnostic</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#063d1e,#c8a200);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:black;
color:white;
width:92%;
max-width:900px;
padding:30px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.7);
}

h1,h2,h3{
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
font-size:16px;
border:none;
border-radius:6px;
background:#ffd700;
cursor:pointer;
}

.progress{
height:16px;
background:#333;
border-radius:8px;
margin-bottom:25px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c853,#ffd700);
}

.option{
background:#1f1f1f;
padding:12px;
border-radius:6px;
margin:8px 0;
cursor:pointer;
border:1px solid #333;
}

.option:hover{
background:#2a2a2a;
}

.correct{
background:#2e7d32;
}

.wrong{
background:#c62828;
}

.topicBar{
height:12px;
background:#333;
border-radius:6px;
margin-bottom:16px;
}

.topicFill{
height:12px;
background:#ffd700;
}

.topicButton{
display:block;
width:100%;
margin:6px 0;
}

</style>

</head>

<body>

<div class="container">

<div id="app"></div>

</div>

<script>

/* ---------------- QUESTION BANK ---------------- */

const questionBank=[

{q:"How many minutes are in one hour?",o:["60","100","30","24"],a:0,t:"Measurement"},
{q:"How many centimetres are in one metre?",o:["10","100","1000","10000"],a:1,t:"Measurement"},
{q:"300 centimetres equals how many metres?",o:["0.3","3","30","300"],a:1,t:"Measurement"},
{q:"How many grams are in one kilogram?",o:["100","1000","10","10000"],a:1,t:"Measurement"},

{q:"Which number is largest?",o:["0.56","0.65","0.605","0.6"],a:1,t:"Decimals"},
{q:"7.5 ÷ 5 equals",o:["0.75","1.5","2.5","15"],a:1,t:"Decimals"},
{q:"4.2 × 3 equals",o:["12.6","7.2","42","1.26"],a:0,t:"Decimals"},

{q:"10% of 80 equals",o:["8","80","0.8","16"],a:0,t:"Percentages"},
{q:"10% of 250 equals",o:["25","2.5","250","0.25"],a:0,t:"Percentages"},
{q:"0.45 written as a percentage",o:["4.5%","45%","450%","0.45%"],a:1,t:"Percentages"},

{q:"1/4 written as a decimal",o:["0.2","0.25","0.4","0.5"],a:1,t:"FDP"},
{q:"1/5 written as a decimal",o:["0.1","0.2","0.25","0.5"],a:1,t:"FDP"},
{q:"75% written as a decimal",o:["0.75","7.5","0.075","75"],a:0,t:"FDP"},

{q:"Angles in a triangle add up to",o:["90","180","360","270"],a:1,t:"Angles"},
{q:"Angles around a point add up to",o:["180","90","360","270"],a:2,t:"Angles"},
{q:"Angles on a straight line add up to",o:["90","180","360","270"],a:1,t:"Angles"},
{q:"Corresponding angles are",o:["Equal","180","90","Random"],a:0,t:"Angles"},
{q:"Co-interior angles",o:["Equal","Add to 180","Add to 90","Random"],a:1,t:"Angles"},

{q:"Which number is prime?",o:["9","11","15","21"],a:1,t:"Prime Factors"},
{q:"Prime factors of 12 include",o:["2 and 3","4 and 3","6 and 2","12"],a:0,t:"Prime Factors"},

{q:"Round 4.376 to 2 decimal places",o:["4.38","4.37","4.36","4.4"],a:0,t:"Rounding"},
{q:"Round 3486 to 2 significant figures",o:["3500","3400","3480","3490"],a:0,t:"Rounding"},

{q:"Which axis runs horizontally?",o:["X","Y","Z","Angle"],a:0,t:"Coordinates"},
{q:"Which axis runs vertically?",o:["X","Y","Z","Angle"],a:1,t:"Coordinates"},
{q:"Which coordinate comes first?",o:["X","Y","Z","Angle"],a:0,t:"Coordinates"},

{q:"Which symbol means greater than?",o:["<",">","≤","≥"],a:1,t:"Inequalities"},
{q:"Which symbol means less than?",o:["<","≤",">","≥"],a:0,t:"Inequalities"}

]

/* --------------- GLOBAL VARIABLES --------------- */

let questions=[]
let index=0
let score=0
let locked=false
let topics={}

/* --------------- START SCREEN ---------------- */

function startScreen(){

document.getElementById("app").innerHTML=`

<h1>GCSE Maths Diagnostic</h1>

<h3>Choose a Mode</h3>

<button onclick="startDiagnostic()">Full Diagnostic</button>

<button onclick="topicMenu()">Practice a Topic</button>

`

}

/* --------------- DIAGNOSTIC MODE ---------------- */

function startDiagnostic(){

questions=shuffle([...questionBank]).slice(0,20)

startQuiz()

}

/* --------------- TOPIC MODE ---------------- */

function topicMenu(){

let topics=[...new Set(questionBank.map(q=>q.t))]

let html="<h2>Select a Topic</h2>"

topics.forEach(t=>{
html+=`<button class="topicButton" onclick="startTopic('${t}')">${t}</button>`
})

html+=`<br><button onclick="startScreen()">Back</button>`

document.getElementById("app").innerHTML=html

}

function startTopic(topic){

let topicQuestions=questionBank.filter(q=>q.t===topic)

questions=shuffle(topicQuestions).slice(0,10)

startQuiz()

}

/* --------------- QUIZ ENGINE ---------------- */

function startQuiz(){

index=0
score=0
locked=false
topics={}

loadQuestion()

}

function loadQuestion(){

let q=questions[index]

let html=`

<div class="progress">
<div class="bar" style="width:${(index/questions.length)*100}%"></div>
</div>

<h3>${q.q}</h3>

`

q.o.forEach((opt,i)=>{

html+=`<div class="option" onclick="answer(${i})" id="opt${i}">${opt}</div>`

})

html+=`<div id="feedback"></div>`

document.getElementById("app").innerHTML=html

}

function answer(choice){

if(locked) return
locked=true

let q=questions[index]

if(!topics[q.t]) topics[q.t]={correct:0,total:0}

topics[q.t].total++

if(choice===q.a){

score++
topics[q.t].correct++

document.getElementById("opt"+choice).classList.add("correct")

document.getElementById("feedback").innerHTML="Correct"

}else{

document.getElementById("opt"+choice).classList.add("wrong")

document.getElementById("opt"+q.a).classList.add("correct")

document.getElementById("feedback").innerHTML="Incorrect"

}

setTimeout(nextQuestion,3000)

}

function nextQuestion(){

index++
locked=false

if(index<questions.length){

loadQuestion()

}else{

finish()

}

}

/* --------------- RESULT SCREEN ---------------- */

function finish(){

let percent=Math.round(score/questions.length*100)

let html=`<h2>Your Score: ${percent}%</h2>`

html+="<h3>Topic Mastery</h3>"

let weak=[]

for(let t in topics){

let p=Math.round((topics[t].correct/topics[t].total)*100)

html+=`${t} ${p}%`

html+=`<div class="topicBar"><div class="topicFill" style="width:${p}%"></div></div>`

if(p<60) weak.push(t)

}

if(weak.length>0){

html+="<h3>Priority Revision</h3>"

weak.forEach(w=>{
html+=w+"<br>"
})

}

html+=`

<br>

<button onclick="startScreen()">Home</button>

<button onclick="startDiagnostic()">Run Diagnostic Again</button>

`

document.getElementById("app").innerHTML=html

}

/* --------------- HELPERS ---------------- */

function shuffle(arr){

return arr.sort(()=>Math.random()-0.5)

}

startScreen()

</script>

</body>
</html>
