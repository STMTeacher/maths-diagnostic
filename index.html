<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCSE Maths Diagnostic</title>
  <style>
    :root{
      --bg1:#052a16;
      --bg2:#a88400;
      --card:#0d0d0d;
      --card2:#171717;
      --text:#f5f5f5;
      --muted:#c9c9c9;
      --gold:#ffd700;
      --gold2:#c9a227;
      --green:#22c55e;
      --red:#dc2626;
      --line:#2a2a2a;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
      padding:20px;
    }

    .shell{
      max-width:980px;
      margin:0 auto;
    }

    .frame{
      background:rgba(0,0,0,.88);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:0 20px 40px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .topbar{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(90deg, rgba(255,215,0,.08), rgba(34,197,94,.08));
    }

    .brand{
      margin:0;
      font-size:clamp(1.5rem, 2.3vw, 2.2rem);
      text-align:center;
      letter-spacing:.3px;
    }

    .subtitle{
      margin:8px 0 0;
      text-align:center;
      color:var(--muted);
      font-size:.98rem;
    }

    .content{
      padding:22px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
    }

    .panel{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
    }

    .panel h3{
      margin:0 0 10px;
      font-size:1.05rem;
    }

    .panel p{
      margin:0;
      color:var(--muted);
      line-height:1.45;
      font-size:.95rem;
    }

    .big-btn, .small-btn, .topic-btn{
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      transition:.18s ease;
    }

    .big-btn{
      width:100%;
      padding:14px 16px;
      margin-top:14px;
      background:linear-gradient(90deg,var(--green),var(--gold));
      color:#000;
      font-size:1rem;
    }

    .big-btn:hover,
    .small-btn:hover,
    .topic-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .small-btn{
      padding:11px 14px;
      background:var(--gold);
      color:#000;
      font-size:.95rem;
      margin:6px 8px 0 0;
    }

    .ghost-btn{
      background:#222;
      color:#fff;
      border:1px solid #333;
    }

    .danger-btn{
      background:#7f1d1d;
      color:#fff;
    }

    .topic-btn{
      width:100%;
      text-align:left;
      padding:14px 14px;
      margin:8px 0;
      background:#181818;
      color:#fff;
      border:1px solid #2c2c2c;
      font-size:.98rem;
    }

    .stat-row{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin:14px 0 18px;
    }

    .stat{
      background:#151515;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      text-align:center;
    }

    .stat .num{
      font-size:1.5rem;
      font-weight:700;
      color:var(--gold);
    }

    .stat .label{
      margin-top:6px;
      color:var(--muted);
      font-size:.92rem;
    }

    .progress-wrap{
      margin:8px 0 18px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:.94rem;
      color:var(--muted);
      margin-bottom:8px;
    }

    .progress{
      height:16px;
      background:#2a2a2a;
      border-radius:999px;
      overflow:hidden;
    }

    .bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--green),var(--gold));
      transition:width .25s ease;
    }

    .question-card{
      background:#111;
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
    }

    .q-topic{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,215,0,.12);
      color:#ffe88a;
      font-size:.82rem;
      margin-bottom:12px;
      border:1px solid rgba(255,215,0,.18);
    }

    .question{
      font-size:1.28rem;
      line-height:1.4;
      margin:0 0 16px;
    }

    .option{
      background:#1a1a1a;
      border:1px solid #2f2f2f;
      border-radius:14px;
      padding:14px 14px;
      margin:10px 0;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .option:hover{
      background:#222;
    }

    .option-letter{
      width:32px;
      height:32px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#2a2a2a;
      font-weight:700;
      flex:0 0 32px;
    }

    .option.correct{
      background:rgba(34,197,94,.18);
      border-color:rgba(34,197,94,.6);
    }

    .option.wrong{
      background:rgba(220,38,38,.18);
      border-color:rgba(220,38,38,.6);
    }

    .feedback{
      margin-top:12px;
      min-height:28px;
      font-weight:700;
      font-size:1rem;
    }

    .feedback.correct{
      color:#98f0b7;
    }

    .feedback.wrong{
      color:#ff9f9f;
    }

    .countdown{
      color:var(--muted);
      font-weight:400;
      margin-left:8px;
    }

    .topic-line{
      margin:14px 0 16px;
    }

    .topic-label{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:.95rem;
      margin-bottom:6px;
    }

    .topic-bar{
      height:14px;
      background:#2b2b2b;
      border-radius:999px;
      overflow:hidden;
    }

    .topic-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--green),var(--gold));
    }

    .list{
      margin:10px 0 0;
      padding-left:18px;
      color:var(--muted);
    }

    .muted{
      color:var(--muted);
    }

    .actions{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .tag{
      display:inline-block;
      background:#222;
      border:1px solid #333;
      padding:8px 10px;
      border-radius:999px;
      margin:5px 8px 0 0;
      color:#f1f1f1;
      font-size:.9rem;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:18px 0;
    }

    .note{
      font-size:.9rem;
      color:var(--muted);
      line-height:1.45;
    }

    .loading{
      text-align:center;
      padding:28px 12px;
      color:var(--muted);
    }

    @media (max-width:640px){
      .content{padding:16px}
      .question{font-size:1.12rem}
      .option{padding:12px}
      .brand{font-size:1.45rem}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="frame">
      <div class="topbar">
        <h1 class="brand">GCSE Maths Survival Diagnostic</h1>
        <p class="subtitle">Find gaps. Practise specific topics. Track progress on this device.</p>
      </div>
      <div class="content">
        <div id="app">
          <div class="loading">Loading questions…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ANALYTICS_KEY = "gcseMathsDiagnosticAnalyticsV1";
    const LETTERS = ["A","B","C","D"];

    let questionBank = [];
    let TOPICS = [];

    let questions = [];
    let index = 0;
    let score = 0;
    let locked = false;
    let countdownInterval = null;
    let topicScores = {};
    let currentMode = "";
    let currentTopic = "";

    function render(html){
      document.getElementById("app").innerHTML = html;
    }

    function saveAnalytics(result){
      const existing = JSON.parse(localStorage.getItem(ANALYTICS_KEY) || "[]");
      existing.push(result);
      localStorage.setItem(ANALYTICS_KEY, JSON.stringify(existing));
    }

    function getAnalytics(){
      return JSON.parse(localStorage.getItem(ANALYTICS_KEY) || "[]");
    }

    function clearAnalytics(){
      localStorage.removeItem(ANALYTICS_KEY);
      analyticsScreen();
    }

    function shuffle(array){
      const arr = [...array];
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normaliseActive(value){
      const v = String(value ?? "").trim().toLowerCase();
      return v === "yes" || v === "true" || v === "1" || v === "y";
    }

    function parseCsv(text){
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"'){
          if(inQuotes && next === '"'){
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if(char === ',' && !inQuotes){
          row.push(cell);
          cell = "";
        } else if((char === '\n' || char === '\r') && !inQuotes){
          if(char === '\r' && next === '\n'){
            i++;
          }
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if(cell.length > 0 || row.length > 0){
        row.push(cell);
        rows.push(row);
      }

      return rows
        .map(r => r.map(c => String(c ?? "").trim()))
        .filter(r => r.some(c => c !== ""));
    }

    function buildQuestionBankFromCsv(text){
      const rows = parseCsv(text);

      if(rows.length < 2){
        throw new Error("questions.csv appears to be empty or missing data rows.");
      }

      const headers = rows[0].map(h => h.trim().toLowerCase());

      const idx = {
        id: headers.indexOf("id"),
        topic: headers.indexOf("topic"),
        question: headers.indexOf("question"),
        optionA: headers.indexOf("option a"),
        optionB: headers.indexOf("option b"),
        optionC: headers.indexOf("option c"),
        optionD: headers.indexOf("option d"),
        correctLetter: headers.indexOf("correct letter"),
        correctIndex: headers.indexOf("correct index"),
        active: headers.indexOf("active"),
        notes: headers.indexOf("notes")
      };

      const required = ["topic","question","optionA","optionB","optionC","optionD"];
      for(const key of required){
        if(idx[key] === -1){
          throw new Error(`Missing required CSV column: ${key}`);
        }
      }

      const parsed = rows.slice(1).map((cols, rowIndex) => {
        const activeValue = idx.active !== -1 ? cols[idx.active] : "Yes";
        if(!normaliseActive(activeValue)) return null;

        const question = cols[idx.question] ?? "";
        const topic = cols[idx.topic] ?? "";
        const options = [
          cols[idx.optionA] ?? "",
          cols[idx.optionB] ?? "",
          cols[idx.optionC] ?? "",
          cols[idx.optionD] ?? ""
        ];

        let answerIndex = -1;

        if(idx.correctIndex !== -1 && cols[idx.correctIndex] !== ""){
          const parsedIndex = Number(cols[idx.correctIndex]);
          if(Number.isInteger(parsedIndex) && parsedIndex >= 0 && parsedIndex <= 3){
            answerIndex = parsedIndex;
          }
        }

        if(answerIndex === -1 && idx.correctLetter !== -1){
          const letter = String(cols[idx.correctLetter] ?? "").trim().toUpperCase();
          answerIndex = LETTERS.indexOf(letter);
        }

        if(!question || !topic || options.some(o => o === "") || answerIndex < 0 || answerIndex > 3){
          console.warn("Skipping invalid CSV row", rowIndex + 2, cols);
          return null;
        }

        return {
          q: question,
          o: options,
          a: answerIndex,
          t: topic
        };
      }).filter(Boolean);

      if(!parsed.length){
        throw new Error("No valid active questions were found in questions.csv.");
      }

      return parsed;
    }

    async function loadQuestions(){
      try{
        const response = await fetch("questions.csv", { cache: "no-store" });
        if(!response.ok){
          throw new Error(`Unable to load questions.csv (${response.status})`);
        }

        const text = await response.text();
        questionBank = buildQuestionBankFromCsv(text);
        TOPICS = [...new Set(questionBank.map(q => q.t))].sort((a,b) => a.localeCompare(b));

        startScreen();
      } catch(error){
        console.error(error);
        render(`
          <div class="panel">
            <h2>Unable to load questions</h2>
            <p class="muted">The app could not read <strong>questions.csv</strong>.</p>
            <div class="divider"></div>
            <p class="note">
              Check that:
              <br>• <strong>questions.csv</strong> is in the same folder as this HTML file
              <br>• the file includes the expected column headings
              <br>• you are opening the site through GitHub Pages or another web server
            </p>
            <div class="divider"></div>
            <p class="note"><strong>Error:</strong> ${escapeHtml(error.message)}</p>
          </div>
        `);
      }
    }

    function startScreen(){
      const analytics = getAnalytics();
      const attempts = analytics.length;
      const avg = attempts
        ? Math.round(analytics.reduce((sum,a)=>sum + a.percent, 0) / attempts)
        : 0;

      render(`
        <div class="grid">
          <div class="panel">
            <h3>Full Diagnostic</h3>
            <p>20 random questions across topics. Best for finding the main gaps quickly.</p>
            <button class="big-btn" onclick="startDiagnostic()">Start Full Diagnostic</button>
          </div>
          <div class="panel">
            <h3>Practice a Topic</h3>
            <p>Choose one topic and complete 10 focused questions.</p>
            <button class="big-btn" onclick="topicMenu()">Choose a Topic</button>
          </div>
          <div class="panel">
            <h3>Teacher Analytics</h3>
            <p>See results saved on this browser and device.</p>
            <button class="big-btn" onclick="analyticsScreen()">Open Analytics</button>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat">
            <div class="num">${questionBank.length}</div>
            <div class="label">Questions in bank</div>
          </div>
          <div class="stat">
            <div class="num">${TOPICS.length}</div>
            <div class="label">Topics covered</div>
          </div>
          <div class="stat">
            <div class="num">${attempts}</div>
            <div class="label">Saved attempts on this device</div>
          </div>
          <div class="stat">
            <div class="num">${attempts ? avg + "%" : "—"}</div>
            <div class="label">Average score</div>
          </div>
        </div>

        <div class="panel">
          <h3>Topics included</h3>
          <div>
            ${TOPICS.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}
          </div>
          <div class="divider"></div>
          <p class="note">Students receive a random set of questions each time. Results are saved only on the device and browser being used.</p>
        </div>
      `);
    }

    function startDiagnostic(){
      currentMode = "diagnostic";
      currentTopic = "";
      questions = shuffle(questionBank).slice(0, Math.min(20, questionBank.length));
      startQuiz();
    }

    function topicMenu(){
      render(`
        <div class="panel">
          <h2>Select a Topic</h2>
          <p class="muted">Each topic practice uses up to 10 random questions from that topic.</p>
          ${TOPICS.map(topic => `
            <button class="topic-btn" onclick="startTopic(decodeURIComponent('${encodeURIComponent(topic)}'))">
              ${escapeHtml(topic)}
            </button>
          `).join("")}
          <div class="actions">
            <button class="small-btn ghost-btn" onclick="startScreen()">Back</button>
          </div>
        </div>
      `);
    }

    function startTopic(topic){
      currentMode = "topic";
      currentTopic = topic;
      const topicQuestions = questionBank.filter(q => q.t === topic);
      questions = shuffle(topicQuestions).slice(0, Math.min(10, topicQuestions.length));
      startQuiz();
    }

    function startQuiz(){
      index = 0;
      score = 0;
      locked = false;
      topicScores = {};
      clearInterval(countdownInterval);

      if(!questions.length){
        render(`
          <div class="panel">
            <h2>No questions available</h2>
            <p class="muted">There are no valid questions available for this selection.</p>
            <div class="actions">
              <button class="small-btn ghost-btn" onclick="startScreen()">Back</button>
            </div>
          </div>
        `);
        return;
      }

      loadQuestion();
    }

    function progressPercent(){
      return Math.round((index / questions.length) * 100);
    }

    function loadQuestion(){
      const q = questions[index];

      render(`
        <div class="progress-wrap">
          <div class="progress-meta">
            <span>${currentMode === "topic" ? "Topic Practice" : "Full Diagnostic"}${currentTopic ? " · " + escapeHtml(currentTopic) : ""}</span>
            <span>Question ${index + 1} of ${questions.length}</span>
          </div>
          <div class="progress">
            <div class="bar" style="width:${progressPercent()}%"></div>
          </div>
        </div>

        <div class="question-card">
          <div class="q-topic">${escapeHtml(q.t)}</div>
          <h2 class="question">${escapeHtml(q.q)}</h2>

          <div id="optionsWrap">
            ${q.o.map((opt, i) => `
              <div class="option" id="opt${i}" onclick="answer(${i})">
                <span class="option-letter">${LETTERS[i]}</span>
                <span>${escapeHtml(opt)}</span>
              </div>
            `).join("")}
          </div>

          <div id="feedback" class="feedback"></div>

          <div class="actions">
            <button class="small-btn ghost-btn" onclick="startScreen()">Exit to Home</button>
          </div>
        </div>
      `);
    }

    function answer(choice){
      if(locked) return;
      locked = true;

      const q = questions[index];
      if(!topicScores[q.t]){
        topicScores[q.t] = { correct: 0, total: 0 };
      }
      topicScores[q.t].total++;

      const selected = document.getElementById("opt" + choice);
      const correct = document.getElementById("opt" + q.a);
      const feedbackEl = document.getElementById("feedback");

      if(choice === q.a){
        score++;
        topicScores[q.t].correct++;
        selected.classList.add("correct");
        feedbackEl.className = "feedback correct";
        feedbackEl.innerHTML = `✅ Correct <span class="countdown" id="countdown"></span>`;
      } else {
        selected.classList.add("wrong");
        correct.classList.add("correct");
        feedbackEl.className = "feedback wrong";
        feedbackEl.innerHTML = `❌ Incorrect <span class="countdown" id="countdown"></span>`;
      }

      let remaining = 3;
      const countdownEl = document.getElementById("countdown");
      countdownEl.textContent = `· Next question in ${remaining}s`;

      countdownInterval = setInterval(() => {
        remaining--;
        if(remaining > 0 && countdownEl){
          countdownEl.textContent = `· Next question in ${remaining}s`;
        }
      }, 1000);

      setTimeout(() => {
        clearInterval(countdownInterval);
        nextQuestion();
      }, 3000);
    }

    function nextQuestion(){
      index++;
      locked = false;
      clearInterval(countdownInterval);

      if(index < questions.length){
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function buildRevisionAdvice(topicPercentages){
      return topicPercentages
        .filter(x => x.percent < 60)
        .sort((a,b) => a.percent - b.percent);
    }

    function finishQuiz(){
      const percent = Math.round((score / questions.length) * 100);

      const topicPercentages = Object.keys(topicScores).map(topic => {
        const data = topicScores[topic];
        return {
          topic,
          percent: Math.round((data.correct / data.total) * 100),
          correct: data.correct,
          total: data.total
        };
      }).sort((a,b) => a.topic.localeCompare(b.topic));

      const weak = buildRevisionAdvice(topicPercentages);

      saveAnalytics({
        date: new Date().toISOString(),
        mode: currentMode,
        selectedTopic: currentTopic,
        percent,
        score,
        total: questions.length,
        topics: topicPercentages
      });

      render(`
        <div class="panel">
          <h2>Student Report</h2>
          <div class="stat-row">
            <div class="stat">
              <div class="num">${score}/${questions.length}</div>
              <div class="label">Questions correct</div>
            </div>
            <div class="stat">
              <div class="num">${percent}%</div>
              <div class="label">Overall score</div>
            </div>
            <div class="stat">
              <div class="num">${currentMode === "topic" ? escapeHtml(currentTopic) : "Mixed"}</div>
              <div class="label">Mode</div>
            </div>
          </div>

          <h3>Topic Mastery</h3>
          ${topicPercentages.map(item => `
            <div class="topic-line">
              <div class="topic-label">
                <span>${escapeHtml(item.topic)}</span>
                <span>${item.percent}% (${item.correct}/${item.total})</span>
              </div>
              <div class="topic-bar">
                <div class="topic-fill" style="width:${item.percent}%"></div>
              </div>
            </div>
          `).join("")}

          <div class="divider"></div>

          <h3>Priority Revision</h3>
          ${
            weak.length
              ? `<ul class="list">${weak.map(w => `<li>${escapeHtml(w.topic)}</li>`).join("")}</ul>`
              : `<p class="muted">No major gaps detected in this attempt.</p>`
          }

          <div class="actions">
            <button class="small-btn" onclick="startScreen()">Home</button>
            <button class="small-btn" onclick="${currentMode === "topic"
              ? `startTopic(decodeURIComponent('${encodeURIComponent(currentTopic)}'))`
              : `startDiagnostic()`}">Try Again</button>
            <button class="small-btn ghost-btn" onclick="analyticsScreen()">View Analytics</button>
          </div>
        </div>
      `);
    }

    function analyticsScreen(){
      const data = getAnalytics();

      if(!data.length){
        render(`
          <div class="panel">
            <h2>Teacher Analytics</h2>
            <p class="muted">No saved attempts yet on this device.</p>
            <div class="actions">
              <button class="small-btn ghost-btn" onclick="startScreen()">Back</button>
            </div>
          </div>
        `);
        return;
      }

      const attempts = data.length;
      const avg = Math.round(data.reduce((sum, x) => sum + x.percent, 0) / attempts);
      const latest = data[data.length - 1].percent;

      const topicMap = {};
      data.forEach(attempt => {
        (attempt.topics || []).forEach(t => {
          if(!topicMap[t.topic]){
            topicMap[t.topic] = { totalPercent: 0, count: 0, weakCount: 0 };
          }
          topicMap[t.topic].totalPercent += t.percent;
          topicMap[t.topic].count += 1;
          if(t.percent < 60) topicMap[t.topic].weakCount += 1;
        });
      });

      const topicSummary = Object.keys(topicMap).map(topic => ({
        topic,
        avg: Math.round(topicMap[topic].totalPercent / topicMap[topic].count),
        weakCount: topicMap[topic].weakCount,
        count: topicMap[topic].count
      })).sort((a,b) => a.avg - b.avg);

      render(`
        <div class="panel">
          <h2>Teacher Analytics</h2>
          <p class="note">These results come from this browser on this device only.</p>

          <div class="stat-row">
            <div class="stat">
              <div class="num">${attempts}</div>
              <div class="label">Saved attempts</div>
            </div>
            <div class="stat">
              <div class="num">${avg}%</div>
              <div class="label">Average score</div>
            </div>
            <div class="stat">
              <div class="num">${latest}%</div>
              <div class="label">Latest score</div>
            </div>
          </div>

          <h3>Weakest Topics</h3>
          ${topicSummary.map(item => `
            <div class="topic-line">
              <div class="topic-label">
                <span>${escapeHtml(item.topic)}</span>
                <span>${item.avg}% average · weak in ${item.weakCount} attempt(s)</span>
              </div>
              <div class="topic-bar">
                <div class="topic-fill" style="width:${item.avg}%"></div>
              </div>
            </div>
          `).join("")}

          <div class="actions">
            <button class="small-btn ghost-btn" onclick="startScreen()">Back</button>
            <button class="small-btn danger-btn" onclick="clearAnalytics()">Clear Analytics</button>
          </div>
        </div>
      `);
    }

    loadQuestions();
  </script>
</body>
</html>
