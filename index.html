<!DOCTYPE html>
<html>
<head>

<title>GCSE Maths Survival Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f3d0f,#c8a400);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:black;
color:white;
max-width:750px;
width:92%;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-top:0;
}

.progress{
height:16px;
background:#333;
border-radius:8px;
margin-bottom:20px;
overflow:hidden;
}

.bar{
height:16px;
background:linear-gradient(90deg,#00c853,#ffd700);
width:0%;
}

.question{
font-size:20px;
margin-bottom:15px;
}

.option{
background:#1f1f1f;
padding:12px;
border-radius:6px;
margin:8px 0;
cursor:pointer;
border:1px solid #333;
}

.option:hover{
background:#2a2a2a;
}

.correct{
background:#2e7d32;
}

.wrong{
background:#c62828;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:#ffd700;
color:black;
cursor:pointer;
}

.result{
margin-top:25px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>GCSE Maths Survival Test</h1>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="question" class="question"></div>

<div id="options"></div>

<div id="feedback"></div>

<div id="result" class="result"></div>

</div>

<script>

const questions=[

{q:"How many minutes are in 1 hour?",o:["60","100","30","24"],a:0,topic:"Measurement"},
{q:"Convert 300 cm into metres",o:["0.3","3","30","300"],a:1,topic:"Measurement"},
{q:"Find 10% of 80",o:["8","80","0.8","16"],a:0,topic:"Percentages"},
{q:"Convert 0.35 to a percentage",o:["3.5%","35%","350%","0.35%"],a:1,topic:"Percentages"},
{q:"What is 1/5 as a decimal?",o:["0.1","0.2","0.25","0.5"],a:1,topic:"FDP"},
{q:"Angles in a triangle add up to",o:["90","180","360","270"],a:1,topic:"Angles"},
{q:"Angles around a point equal",o:["90","180","360","270"],a:2,topic:"Angles"},
{q:"Which number is prime?",o:["9","11","15","21"],a:1,topic:"Prime"},
{q:"Round 4.376 to 2 decimal places",o:["4.38","4.37","4.36","4.4"],a:0,topic:"Rounding"},
{q:"Coordinate when x=4 y=2",o:["(4,2)","(2,4)","(4,4)","(2,2)"],a:0,topic:"Coordinates"}

]

let index=0
let score=0
let topics={}
let locked=false

function load(){

locked=false

const q=questions[index]

document.getElementById("question").innerHTML=q.q

let html=""

q.o.forEach((opt,i)=>{

html+=`<div class="option" id="opt${i}" onclick="selectAnswer(${i})">${opt}</div>`

})

document.getElementById("options").innerHTML=html

updateBar()

}

function selectAnswer(i){

if(locked) return

locked=true

const q=questions[index]

if(!topics[q.topic]) topics[q.topic]={correct:0,total:0}

topics[q.topic].total++

if(i===q.a){

score++
topics[q.topic].correct++

document.getElementById("opt"+i).classList.add("correct")

document.getElementById("feedback").innerHTML="✅ Correct"

}else{

document.getElementById("opt"+i).classList.add("wrong")

document.getElementById("opt"+q.a).classList.add("correct")

document.getElementById("feedback").innerHTML="❌ Incorrect"

}

setTimeout(nextQuestion,3000)

}

function nextQuestion(){

index++

if(index<questions.length){

document.getElementById("feedback").innerHTML=""
load()

}else{

finish()

}

}

function updateBar(){

let percent=(index/questions.length)*100

document.getElementById("bar").style.width=percent+"%"

}

function finish(){

let percent=Math.round((score/questions.length)*100)

let html="<h2>Your Score: "+percent+"%</h2>"

html+="<h3>Topic Analysis</h3>"

let weak=[]

for(let t in topics){

let p=Math.round((topics[t].correct/topics[t].total)*100)

html+=t+": "+p+"%<br>"

if(p<60) weak.push(t)

}

if(weak.length>0){

html+="<h3>Recommended Revision</h3>"

weak.forEach(w=>{
html+=w+"<br>"
})

}

document.getElementById("question").innerHTML=""
document.getElementById("options").innerHTML=""
document.getElementById("feedback").innerHTML=""
document.getElementById("result").innerHTML=html

}

load()

</script>

</body>
</html>
