<script>

const ANALYTICS_KEY = "gcseMathsDiagnosticAnalyticsV1";

let questionBank = [];
let TOPICS = [];
const LETTERS = ["A","B","C","D"];

let questions = [];
let index = 0;
let score = 0;
let locked = false;
let countdownInterval = null;
let topicScores = {};
let currentMode = "";
let currentTopic = "";

// LOAD CSV
async function loadQuestionsFromCSV(){
  const res = await fetch("questions.csv");
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  questionBank = rows.map(r=>{
    const c = r.split(",");
    return {
      q: c[2],
      o: [c[3], c[4], c[5], c[6]],
      a: parseInt(c[8]),
      t: c[1]
    };
  }).filter(q => q.q);

  TOPICS = [...new Set(questionBank.map(q => q.t))].sort();

  startScreen();
}

// UTIL
function shuffle(array){
  const arr = [...array];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function render(html){
  document.getElementById("app").innerHTML = html;
}

// HOME SCREEN (UNCHANGED)
function startScreen(){
  const analytics = JSON.parse(localStorage.getItem(ANALYTICS_KEY) || "[]");
  const attempts = analytics.length;
  const avg = attempts
    ? Math.round(analytics.reduce((sum,a)=>sum+a.percent,0) / attempts)
    : 0;

  render(`
    <div class="grid">
      <div class="panel">
        <h3>Full Diagnostic</h3>
        <p>20 random questions across topics.</p>
        <button class="big-btn" onclick="startDiagnostic()">Start Full Diagnostic</button>
      </div>

      <div class="panel">
        <h3>Practice a Topic</h3>
        <button class="big-btn" onclick="topicMenu()">Choose a Topic</button>
      </div>

      <div class="panel">
        <h3>Teacher Analytics</h3>
        <button class="big-btn" onclick="analyticsScreen()">Open Analytics</button>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat"><div class="num">${questionBank.length}</div><div class="label">Questions</div></div>
      <div class="stat"><div class="num">${TOPICS.length}</div><div class="label">Topics</div></div>
      <div class="stat"><div class="num">${attempts}</div><div class="label">Attempts</div></div>
      <div class="stat"><div class="num">${attempts ? avg+"%" : "-"}</div><div class="label">Average</div></div>
    </div>
  `);
}

// MODES
function startDiagnostic(){
  currentMode = "diagnostic";
  currentTopic = "";
  questions = shuffle(questionBank).slice(0,20);
  startQuiz();
}

function topicMenu(){
  render(`
    <div class="panel">
      <h2>Select Topic</h2>
      ${TOPICS.map(t=>`<button class="topic-btn" onclick="startTopic('${t}')">${t}</button>`).join("")}
      <button class="small-btn" onclick="startScreen()">Back</button>
    </div>
  `);
}

function startTopic(topic){
  currentMode = "topic";
  currentTopic = topic;
  const topicQs = questionBank.filter(q=>q.t===topic);
  questions = shuffle(topicQs).slice(0,10);
  startQuiz();
}

// QUIZ
function startQuiz(){
  index = 0;
  score = 0;
  topicScores = {};
  locked = false;
  clearInterval(countdownInterval);
  loadQuestion();
}

function loadQuestion(){
  const q = questions[index];

  render(`
    <div class="progress-wrap">
      <div class="progress"><div class="bar" style="width:${(index/questions.length)*100}%"></div></div>
    </div>

    <div class="question-card">
      <div class="q-topic">${q.t}</div>
      <h2 class="question">${q.q}</h2>

      ${q.o.map((opt,i)=>`
        <div class="option" id="opt${i}" onclick="answer(${i})">
          <span class="option-letter">${LETTERS[i]}</span>
          ${opt}
        </div>
      `).join("")}

      <div id="feedback" class="feedback"></div>

      <button class="small-btn" onclick="startScreen()">Exit</button>
    </div>
  `);
}

// ✅ FIXED ANSWER FUNCTION
function answer(choice){
  if(locked) return;
  locked = true;

  const q = questions[index];

  if(!topicScores[q.t]){
    topicScores[q.t] = { correct:0, total:0 };
  }
  topicScores[q.t].total++;

  const options = document.querySelectorAll(".option");
  const feedback = document.getElementById("feedback");

  options.forEach(opt=>opt.style.pointerEvents="none");

  if(choice === q.a){
    score++;
    topicScores[q.t].correct++;
    options[choice].classList.add("correct");
    feedback.className = "feedback correct";
    feedback.innerHTML = `✅ Correct <span id="countdown"></span>`;
  } else {
    options[choice].classList.add("wrong");
    options[q.a].classList.add("correct");
    feedback.className = "feedback wrong";
    feedback.innerHTML = `❌ Incorrect <span id="countdown"></span>`;
  }

  let time = 3;
  const cd = document.getElementById("countdown");
  cd.textContent = `· Next in ${time}s`;

  countdownInterval = setInterval(()=>{
    time--;
    if(time>0) cd.textContent = `· Next in ${time}s`;
  },1000);

  setTimeout(()=>{
    clearInterval(countdownInterval);
    nextQuestion();
  },3000);
}

function nextQuestion(){
  index++;
  locked = false;

  if(index < questions.length){
    loadQuestion();
  } else {
    finishQuiz();
  }
}

// RESULTS
function finishQuiz(){
  const percent = Math.round((score/questions.length)*100);

  const data = JSON.parse(localStorage.getItem(ANALYTICS_KEY)||"[]");
  data.push({percent});
  localStorage.setItem(ANALYTICS_KEY,JSON.stringify(data));

  render(`
    <div class="panel">
      <h2>Results</h2>
      <p>${score}/${questions.length}</p>
      <p>${percent}%</p>
      <button class="small-btn" onclick="startScreen()">Home</button>
    </div>
  `);
}

// ANALYTICS
function analyticsScreen(){
  const data = JSON.parse(localStorage.getItem(ANALYTICS_KEY)||"[]");

  render(`
    <div class="panel">
      <h2>Analytics</h2>
      <p>Attempts: ${data.length}</p>
      <button class="small-btn" onclick="startScreen()">Back</button>
    </div>
  `);
}

// START APP
loadQuestionsFromCSV();

</script>
